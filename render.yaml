services:

  # ─────────────────────────────────────────────────────────────────────────────
  # Django Backend — Render Web Service
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: eduimperium-backend
    runtime: python
    rootDir: backend                      # repo subfolder that contains manage.py
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --workers 2 --timeout 120 --log-file -
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true               # Render generates a secure random value
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "eduimperium-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://eduimperium-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://eduimperium-backend.onrender.com,https://eduimperium-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: eduimperium-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ─────────────────────────────────────────────────────────────────────────────
  # React Frontend — Render Static Site
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: eduimperium-frontend
    runtime: static
    rootDir: frontend                     # repo subfolder that contains package.json
    buildCommand: npm install && npm run build
    staticPublishPath: build              # create-react-app outputs to /build
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html          # Required for client-side routing (React Router)
    envVars:
      - key: REACT_APP_API_URL
        value: "https://eduimperium-backend.onrender.com"
      - key: NODE_VERSION
        value: "18.17.0"

# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL Database — Render Managed Database
# ─────────────────────────────────────────────────────────────────────────────
databases:
  - name: eduimperium-db
    plan: free
    databaseName: eduimperium
    user: eduimperium_user
